<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>바근지팡</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="top-bar" aria-label="게임 정보">
        <div class="brand">
          <p class="eyebrow">밑에서 쏘는 캐릭터 게임</p>
          <h1>바근지팡</h1>
        </div>
        <div class="top-actions">
          <button id="soundBtn" class="home-button" type="button">소리 켜기</button>
          <button id="rankBtn" class="home-button" type="button">순위표</button>
          <button id="pauseBtn" class="home-button" type="button">멈춤</button>
          <button id="homeBtn" class="home-button" type="button">처음으로</button>
        </div>
      </section>

      <section class="stats" aria-label="점수판">
        <div>
          <span>단계</span>
          <strong id="levelText">1</strong>
        </div>
        <div>
          <span>기회</span>
          <strong id="shotsText">8</strong>
        </div>
        <div>
          <span>시간</span>
          <strong id="timeText">45</strong>
        </div>
        <div>
          <span>점수</span>
          <strong id="scoreText">0</strong>
        </div>
      </section>

      <section class="play-wrap">
        <canvas id="gameCanvas" width="900" height="1180" aria-label="바근지팡 게임 화면"></canvas>
        <div id="message" class="message hidden" role="status" aria-live="polite"></div>
      </section>

      <p class="switch-hint">친구를 누르면 주인공이 바뀌어요</p>

      <section class="controls">
        <button id="restartBtn" type="button">현재 단계 다시</button>
        <button id="nextBtn" type="button">다음 단계</button>
      </section>
    </main>

    <section id="nameModal" class="modal-layer" aria-label="닉네임 입력">
      <div class="modal-card">
        <p class="eyebrow">오락실 이름표</p>
        <h2>닉네임을 써요</h2>
        <input id="nameInput" maxlength="10" autocomplete="off" placeholder="예: 은지, EUNJI" />
        <button id="nameStartBtn" type="button">게임 시작</button>
        <p class="modal-note">닉네임만 이 기기에 저장돼요.</p>
      </div>
    </section>

    <section id="rankModal" class="modal-layer hidden" aria-label="순위표">
      <div class="modal-card">
        <p class="eyebrow">바근지팡 순위표</p>
        <h2 id="rankTitle">모두 깼어!</h2>
        <ol id="rankList" class="rank-list"></ol>
        <div class="modal-actions">
          <button id="rankCloseBtn" type="button">계속하기</button>
          <button id="rankRestartBtn" type="button">처음부터 다시</button>
        </div>
      </div>
    </section>

    <section id="pauseModal" class="modal-layer hidden" aria-label="일시정지">
      <div class="modal-card">
        <p class="eyebrow">잠깐 쉬기</p>
        <h2>멈췄어요</h2>
        <p class="modal-note">시간과 캐릭터 움직임이 잠깐 멈춰요.</p>
        <div class="modal-actions">
          <button id="resumeBtn" type="button">계속하기</button>
          <button id="pauseHomeBtn" type="button">처음부터</button>
        </div>
      </div>
    </section>

    <script src="./game.js"></script>
  </body>
</html>
